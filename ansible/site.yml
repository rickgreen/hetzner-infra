---
# Main playbook — runs all roles to fully configure the VPS.
#
# Usage (always pass a vars file):
#   ansible-playbook -i inventory.yml site.yml -e @vars/gasprice.yml
#   ansible-playbook -i inventory.yml site.yml -e @vars/energieprijzen.yml
#
# Selective runs:
#   ansible-playbook -i inventory.yml site.yml -e @vars/<project>.yml --tags nginx
#   ansible-playbook -i inventory.yml site.yml -e @vars/<project>.yml --tags ssl
#   ansible-playbook -i inventory.yml site.yml -e @vars/<project>.yml --tags firewall
#   ansible-playbook -i inventory.yml site.yml -e @vars/<project>.yml --tags fail2ban

- name: Configure VPS
  hosts: gasprice
  become: true

  roles:
    # Base security first
    - ufw
    - fail2ban
    - hardening
    # Then application setup
    - deploy_user
    - nginx
    - certbot
