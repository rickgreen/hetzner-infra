---
# Installs and configures UFW (Uncomplicated Firewall).
# Default policy: deny all inbound, allow all outbound.
# Only SSH, HTTP and HTTPS are permitted inbound.

- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: firewall

- name: Set default policy — deny inbound
  community.general.ufw:
    direction: incoming
    default: deny
  tags: firewall

- name: Set default policy — allow outbound
  community.general.ufw:
    direction: outgoing
    default: allow
  tags: firewall

- name: Allow SSH (port 22)
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    comment: SSH
  tags: firewall

- name: Allow HTTP (port 80)
  community.general.ufw:
    rule: allow
    port: "80"
    proto: tcp
    comment: HTTP
  tags: firewall

- name: Allow HTTPS (port 443)
  community.general.ufw:
    rule: allow
    port: "443"
    proto: tcp
    comment: HTTPS
  tags: firewall

- name: Enable UFW
  community.general.ufw:
    state: enabled
  tags: firewall
