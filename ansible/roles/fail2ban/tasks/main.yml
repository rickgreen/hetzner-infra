---
# Installs Fail2Ban and deploys a custom jail.local.
# jail.conf is never modified — all overrides go in jail.local so
# package upgrades cannot silently revert security settings.

- name: Install Fail2Ban
  ansible.builtin.apt:
    name: fail2ban
    state: present
    update_cache: true
    cache_valid_time: 3600
  tags: fail2ban

- name: Deploy jail.local configuration
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: Restart Fail2Ban
  tags: fail2ban

- name: Ensure Fail2Ban is started and enabled
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true
  tags: fail2ban
